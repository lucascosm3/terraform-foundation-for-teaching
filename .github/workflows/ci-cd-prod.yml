name: 'Terraform CI/CD - PROD'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: 'Terraform Validate - PROD'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config=backend/prod.hcl -upgrade

    - name: Terraform Format Check
      run: terraform fmt -check || echo "Dica rode 'terraform fmt' localmente"

    - name: Terraform Validate
      run: terraform validate

  plan:
    name: 'Terraform Plan - PROD'
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config=backend/prod.hcl -upgrade

    - name: Terraform Plan
      run: terraform plan -var-file=prod.tfvars -out=tfplan

    - name: Upload Terraform Plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-prod
        path: tfplan

  apply:
    name: 'Terraform Apply - PROD'
    runs-on: ubuntu-latest
    needs: [plan]
    environment: prod
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config=backend/prod.hcl -upgrade

    - name: Download Terraform Plan
      uses: actions/download-artifact@v4
      with:
        name: tfplan-prod

    - name: Terraform Apply
      run: terraform apply tfplan

  destroy:
    name: 'Terraform Destroy - PROD'
    runs-on: ubuntu-latest
    needs: [plan]
    environment: prod-destroy
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config=backend/prod.hcl -upgrade

    - name: Terraform Destroy
      run: terraform destroy -var-file=prod.tfvars -auto-approve

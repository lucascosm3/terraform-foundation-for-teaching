name: 'Terraform CI/CD - NP'

on:
  push:
    branches:
      - dev

  workflow_dispatch:

jobs:
  validate:
    name: 'Terraform Validate - NP'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config=backend/np.hcl -upgrade

    - name: Terraform Format Check
      run: |
        terraform fmt -check || echo "Dica: rode 'terraform fmt' localmente para corrigir o formato"

    - name: Terraform Validate
      run: terraform validate

  plan:
    name: 'Terraform Plan - NP'
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config=backend/np.hcl -upgrade

    - name: Terraform Plan
      run: terraform plan -var-file=dev.tfvars -out=tfplan

    - name: Upload Terraform Plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-np
        path: tfplan

  apply:
    name: 'Terraform Apply - NP'
    runs-on: ubuntu-latest
    needs: [plan]
    # O uso de 'environment' permite configurar aprovações manuais (reviewers) no GitHub,
    # tornando este job manual e controlado.
    environment: dev
    # Só aciona o apply se for direto no branch dev, impedindo builds de PR de aplicarem na AWS
    if: github.ref == 'refs/heads/dev' && github.event_name != 'pull_request'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config=backend/np.hcl -upgrade

    - name: Download Terraform Plan
      uses: actions/download-artifact@v4
      with:
        name: tfplan-np

    - name: Terraform Apply
      run: terraform apply tfplan

  destroy:
    name: 'Terraform Destroy - NP'
    runs-on: ubuntu-latest
    needs: [validate]
    # O destroy é manual e exige aprovação no environment correspondente
    environment: dev
    if: github.ref == 'refs/heads/dev' && github.event_name != 'pull_request'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config=backend/np.hcl -upgrade

    - name: Terraform Destroy
      run: terraform destroy -var-file=dev.tfvars -auto-approve

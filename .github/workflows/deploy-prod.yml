name: 'Terraform PROD Deployment'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: 'Terraform Validate - PROD'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config=backend/prod.hcl -upgrade

    - name: Terraform Format Check
      run: |
        terraform fmt -check || echo "Dica: rode 'terraform fmt' localmente para corrigir o formato"

    - name: Terraform Validate
      run: terraform validate

  plan:
    name: 'Terraform Plan - PROD'
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config=backend/prod.hcl -upgrade

    - name: Terraform Plan
      run: terraform plan -var-file=prod.tfvars

  apply:
    name: 'Terraform Apply - PROD'
    runs-on: ubuntu-latest
    needs: [plan]
    environment: prod
    # Só aciona o apply se for direto no branch main, impedindo builds de PR de aplicarem na AWS
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config=backend/prod.hcl -upgrade

    - name: Terraform Apply
      run: terraform apply -var-file=prod.tfvars -auto-approve
